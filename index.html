<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Book a Free Consultation</h1>
    </header>
   <main>
    <form>
        <div class="form-area">
            <div class="left">
            <input type="text" id="fname" name="fname" placeholder="Caregiver Name">
            <br>
            <input type="text" id="email" name="email" placeholder="Email">
            <br>
            <input type="text" id="phone" name="phone" placeholder="Phone">
            <br>
            <input type="text" id="patname" name="patname" placeholder="Patient's Name">
            <br>
            <input type="text" id="patage" name="patage" placeholder="Patient's Age">
                </div>
                <div class="right">
            <textarea name="primconcern" id="primconcern" cols="18" rows="7">Primary Concern</textarea>
            <br>
            <textarea name="addmess" id="addmess" cols="18" rows="4">Additional Message</textarea>
                </div>
        </div>

    <div class="submit-btn">
        <input id="submit" type="submit" name="submitInfo" value="Submit">
          </form>
    </div>

   </main>
</body>
</html>
